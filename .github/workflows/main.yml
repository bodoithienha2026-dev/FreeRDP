name: 🖥️ NATIVE WINDOWS RDP (TAILSCALE)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-native-matrix:
    name: "Windows RDP - Máy số ${{ matrix.instance }}"
    runs-on: windows-latest
    timeout-minutes: 360
    
    

    steps:
      - name: 🔧 Kích hoạt RDP & Tạo User (Máy ${{ matrix.instance }})
        run: |
          # Bật RDP
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          # Tối ưu cấu hình RDP cho mạng ảo
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 0
          Restart-Service TermService -Force
          
          # Tạo tài khoản đúng chuẩn bảo mật (Chú ý chữ N viết hoa)
          net user user Ngoc0102@ /add
          net localgroup administrators user /add
          
          Write-Host "✅ [Máy ${{ matrix.instance }}] Đã tạo tài khoản: user / Mật khẩu: Ngoc0102@"

      - name: 🌐 Kết nối mạng Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: tskey-auth-kWHT7TyhYn11CNTRL-cek3P4ubCKRziDT646joJRo7LoVjShF2
          version: latest

      - name: 📡 Lấy thông tin kết nối (Máy ${{ matrix.instance }})
        run: |
          $TAILSCALE_IP = (tailscale ip -4).Trim()
          
          Write-Host ""
          Write-Host "╔══════════════════════════════════════════════════════════╗"
          Write-Host "║ ✅ MÁY SỐ ${{ matrix.instance }} - ĐÃ SẴN SÀNG KẾT NỐI                  ║"
          Write-Host "╠══════════════════════════════════════════════════════════╣"
          Write-Host "║ 🌐  RDP IP (Tailscale) : $TAILSCALE_IP"
          Write-Host "║ 👤  Username           : user"
          Write-Host "║ 🔐  Password           : Ngoc0102@"
          Write-Host "╚══════════════════════════════════════════════════════════╝"
          Write-Host "💡 Hãy chắc chắn bạn đã BẬT TAILSCALE trên điện thoại/máy tính của mình!"
          Write-Host ""

      - name: ⏰ Duy trì session (6 tiếng)
        run: |
          Write-Host "🟢 [Máy ${{ matrix.instance }}] Bắt đầu duy trì kết nối..."
          for ($i = 1; $i -le 72; $i++) {
              $Elapsed = $i * 5
              $Remaining = 360 - $Elapsed
              Write-Host "[$((Get-Date).ToString('yyyy-MM-dd HH:mm:ss'))] Máy ${{ matrix.instance }} đang chạy | Đã qua: $Elapsed phút | Còn lại: $Remaining phút"
              Start-Sleep -Seconds 300
          }
